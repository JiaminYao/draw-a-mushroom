<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html">Draw</a>
    <a href="meadow.html">Meadow</a>
    <a href="rank.html">Rank</a>
    <a href="profile.html" class="active">Profile</a>
    <span id="nav-auth"></span>
    <a href="https://github.com/JiaminYao/draw-a-mushroom" target="_blank" title="GitHub" class="nav-github">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>

  <div class="profile-container">
    <!-- Not logged in prompt -->
    <div class="profile-login-prompt" id="login-prompt" style="display:none">
      <h2>Login Required</h2>
      <p>You need to log in to view your profile.</p>
      <a href="login.html" class="modal-btn primary">Login</a>
    </div>

    <!-- Profile content -->
    <div class="profile-content" id="profile-content" style="display:none">
      <div class="profile-card">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <div class="profile-name-row">
          <h1 class="profile-name" id="profile-name">Loading...</h1>
          <button class="profile-edit-btn" id="edit-name-btn" style="display:none" title="Edit name">&#9998;</button>
        </div>
        <div class="profile-name-edit" id="name-edit" style="display:none">
          <input type="text" id="name-input" maxlength="50" placeholder="Display name">
          <button class="modal-btn primary" id="name-save">Save</button>
          <button class="modal-btn secondary" id="name-cancel">Cancel</button>
        </div>
        <div class="profile-date" id="profile-date"></div>
      </div>

      <div class="profile-stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-mushrooms">0</div>
          <div class="stat-label">Mushrooms</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-score">0</div>
          <div class="stat-label">Total Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value stat-up" id="stat-upvotes">0</div>
          <div class="stat-label">Upvotes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value stat-down" id="stat-downvotes">0</div>
          <div class="stat-label">Downvotes</div>
        </div>
      </div>

      <div class="profile-actions">
        <button class="profile-action-btn" id="my-mushrooms-btn">My Mushrooms</button>
        <button class="profile-action-btn" id="my-meadow-btn">My Meadow</button>
        <button class="profile-action-btn" id="share-btn">Share Profile</button>
      </div>
    </div>

    <div class="profile-toast" id="profile-toast"></div>
  </div>

  <script src="js/mushroom-utils.js"></script>
  <script src="js/profile.js"></script>
  <script>MushroomUtils.updateAuthNav();</script>
</body>
</html>
